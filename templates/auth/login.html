<!-- Login page for the IRIS Job Portal. -->
{% extends "base.html" %}
{% set title = "Login | IRIS Job Portal" %}
{% block content %}
<section class="hero auth-hero">
    <div class="hero-copy">
        <p class="eyebrow">Smart hiring starts here</p>
        <h1>Sign in to your IRIS workspace.</h1>
        <p>Access your job dashboard, hiring panel, or admin console with one secure login.</p>
    </div>
    <div class="panel form-panel">
        <form method="post" class="form-grid">
            <label>Email
                <input type="email" name="email" placeholder="name@example.com" required>
            </label>
            <label>Password
                <input type="password" name="password" placeholder="Enter your password" required>
            </label>
            <button type="submit" class="button">Login</button>
        </form>
        <p class="muted">New here? <a href="{{ url_for('auth.register') }}">Create an account</a></p>
    </div>
</section>
{% endblock %}
