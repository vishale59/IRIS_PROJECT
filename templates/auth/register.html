{% extends "base.html" %}
{% set title = "Register | IRIS Job Portal" %}
{% block content %}
<div class="row justify-content-center align-items-center min-vh-75">
    <div class="col-lg-10">
        <div class="row g-4 align-items-stretch">
            <div class="col-lg-6">
                <div class="hero-card h-100">
                    <span class="eyebrow">Create account</span>
                    <h1 class="display-6 fw-bold mb-3">Join IRIS and get started in minutes.</h1>
                    <p class="lead text-secondary mb-0">Choose the right account type and step into a cleaner application and hiring experience.</p>
                </div>
            </div>
            <div class="col-lg-6">
                <div class="card auth-card shadow-lg border-0">
                    <div class="card-body p-4 p-lg-5">
                        <h2 class="h3 mb-4">Register</h2>
                        <form method="post" class="vstack gap-3">
                            <div>
                                <label class="form-label">Username</label>
                                <input type="text" name="username" class="form-control form-control-lg" placeholder="Choose a username" required>
                            </div>
                            <div>
                                <label class="form-label">Email</label>
                                <input type="email" name="email" class="form-control form-control-lg" placeholder="name@example.com" required>
                            </div>
                            <div>
                                <label class="form-label">Password</label>
                                <input type="password" name="password" class="form-control form-control-lg" placeholder="Create a password" required>
                            </div>
                            <div>
                                <label class="form-label">Account Type</label>
                                <select name="role" class="form-select form-select-lg" required>
                                    <option value="user">User</option>
                                    <option value="employer">Employer</option>
                                </select>
                            </div>
                            <button type="submit" class="btn btn-primary btn-lg w-100 rounded-pill">Create Account</button>
                        </form>
                        <p class="text-secondary mt-4 mb-0">Already registered? <a href="{{ url_for('auth.login') }}" class="fw-semibold text-decoration-none">Sign in</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
