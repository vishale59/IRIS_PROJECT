<!-- Registration page for the IRIS Job Portal. -->
{% extends "base.html" %}
{% set title = "Register | IRIS Job Portal" %}
{% block content %}
<section class="hero auth-hero">
    <div class="hero-copy">
        <p class="eyebrow">Join the platform</p>
        <h1>Create your IRIS account.</h1>
        <p>Choose a user or employer account and get started in under a minute.</p>
    </div>
    <div class="panel form-panel">
        <form method="post" class="form-grid">
            <label>Username
                <input type="text" name="username" placeholder="Choose a username" required>
            </label>
            <label>Email
                <input type="email" name="email" placeholder="name@example.com" required>
            </label>
            <label>Password
                <input type="password" name="password" placeholder="Create a password" required>
            </label>
            <label>Account Type
                <select name="role" required>
                    <option value="user">User</option>
                    <option value="employer">Employer</option>
                </select>
            </label>
            <button type="submit" class="button">Register</button>
        </form>
        <p class="muted">Already have an account? <a href="{{ url_for('auth.login') }}">Sign in</a></p>
    </div>
</section>
{% endblock %}
