<!-- Admin dashboard page. -->
{% extends "base.html" %}
{% set title = "Admin Dashboard | IRIS Job Portal" %}
{% block content %}
<section class="panel">
    <p class="eyebrow">Platform overview</p>
    <h1>Admin Dashboard</h1>
    <div class="stats-grid">
        <div class="stat-card">
            <span>Users</span>
            <strong>{{ user_count }}</strong>
        </div>
        <div class="stat-card">
            <span>Jobs</span>
            <strong>{{ job_count }}</strong>
        </div>
        <div class="stat-card">
            <span>Applications</span>
            <strong>{{ application_count }}</strong>
        </div>
        <div class="stat-card">
            <span>Resumes</span>
            <strong>{{ resume_count }}</strong>
        </div>
    </div>
</section>
{% endblock %}
