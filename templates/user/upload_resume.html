<!-- Resume upload page for users. -->
{% extends "base.html" %}
{% set title = "Upload Resume | IRIS Job Portal" %}
{% block content %}
<section class="panel form-panel wide">
    <p class="eyebrow">Resume upload</p>
    <h1>Upload your resume for AI analysis.</h1>
    <p class="muted">Accepted formats: PDF, DOC, and DOCX.</p>
    <form method="post" enctype="multipart/form-data" class="form-grid">
        <label>Resume File
            <input type="file" name="resume" accept=".pdf,.doc,.docx" required>
        </label>
        <button type="submit" class="button">Upload and Analyze</button>
    </form>
</section>
{% endblock %}
