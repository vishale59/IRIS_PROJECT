<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 — Page Not Found · IRIS</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>
<div class="error-page">
  <div class="error-card anim-scale">
    <div class="error-code">404</div>
    <div style="width:72px;height:72px;background:rgba(99,102,241,0.1);border-radius:var(--r-2xl);display:flex;align-items:center;justify-content:center;margin:0 auto var(--sp-6);font-size:28px;color:var(--clr-primary)">
      <i class="fa-solid fa-compass-drafting"></i>
    </div>
    <h2 style="margin-bottom:var(--sp-3);color:var(--txt-primary)">Page Not Found</h2>
    <p style="font-size:14px;color:var(--txt-muted);margin-bottom:var(--sp-8);line-height:1.7">The page you're looking for doesn't exist or may have been moved.</p>
    <div style="display:flex;gap:var(--sp-3);justify-content:center;flex-wrap:wrap">
      <a href="javascript:history.back()" class="btn btn-secondary"><i class="fa-solid fa-arrow-left"></i> Go Back</a>
      <a href="/" class="btn btn-primary"><i class="fa-solid fa-house"></i> Home</a>
    </div>
  </div>
</div>
<script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
