<!-- Employer job form page. -->
{% extends "base.html" %}
{% set title = "Post Job | IRIS Job Portal" %}
{% block content %}
<section class="panel form-panel wide">
    <p class="eyebrow">Job management</p>
    <h1>{% if job %}Edit Job{% else %}Post a New Job{% endif %}</h1>
    <form method="post" class="form-grid">
        <label>Job Title
            <input type="text" name="title" value="{{ job.title if job else '' }}" placeholder="Senior Python Developer" required>
        </label>
        <label>Description
            <textarea name="description" rows="10" placeholder="Describe the role, responsibilities, and required skills." required>{{ job.description if job else '' }}</textarea>
        </label>
        <button type="submit" class="button">{% if job %}Save Changes{% else %}Publish Job{% endif %}</button>
    </form>
</section>
{% endblock %}
